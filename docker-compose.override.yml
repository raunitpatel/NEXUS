# Developer override for docker-compose - merged with docker-compose.yml
#  This file is committed to repo.
# It is not used in Railway deployment, but can be used locally to override settings for development.
# Applicaton service volume mounts are added here as services are scaffolded in docker-compose.yml, so that they are only used in development and not in production.

services:

  postgres:
    # Faster health checks during local development
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

