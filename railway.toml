[build]
builder = "DOCKERFILE"

[services.gateway]
source = "."
dockerfile = "services/gateway/Dockerfile"
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/healthz"
healthcheckTimeout = 30

