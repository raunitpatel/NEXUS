
[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    "*.egg-info",
    "dist",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter, not linter
    "B008",  # do not perform function calls in default arguments (FastAPI Depends pattern)
    "B904",  # raise from — relaxed for FastAPI HTTPException patterns
]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["F401", "F811"]  # Allow unused imports and redefinitions in tests
"**/conftest.py" = ["F401"]