
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nexus

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff + Pyright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pyright

      - name: Run Ruff linter
        run: ruff check services/
        # Fails CI if any lint violation found in services/


  # ── Job 2: Test ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install gateway dependencies (superset for unit tests)
        run: |
          pip install --upgrade pip
          pip install -r services/gateway/requirements.txt
          pip install pytest pytest-asyncio pytest-mock pytest-cov

      - name: Add shared module to PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/services/gateway:${{ github.workspace }}/services" >> $GITHUB_ENV

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=services \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --asyncio-mode=auto
        env:
          # Minimal env vars so pydantic-settings doesn't fail on import
          DATABASE_URL: "postgresql+asyncpg://nexus:nexus@localhost:5432/nexus"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "ci-test-secret-key-exactly-32-chars"
          JWT_ALGORITHM: "HS256"
          ORCHESTRATOR_URL: "http://localhost:8001"
          ENVIRONMENT: "test"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ── Job 3: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker image (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # Build all images even if one fails — surfaces all errors at once
      matrix:
        include:
          - service: gateway
            dockerfile: services/gateway/Dockerfile
            image: nexus-gateway
          - service: orchestrator
            dockerfile: services/orchestrator/Dockerfile
            image: nexus-orchestrator
          - service: search-agent
            dockerfile: services/search_agent/Dockerfile
            image: nexus-search-agent
          - service: code-agent
            dockerfile: services/code_agent/Dockerfile
            image: nexus-code-agent
          - service: memory-agent
            dockerfile: services/memory_agent/Dockerfile
            image: nexus-memory-agent
          - service: tool-agent
            dockerfile: services/tool_agent/Dockerfile
            image: nexus-tool-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Build cache scoped per service so each matrix leg has its own cache entry

  # ── Job 4: Push (main only) ──────────────────────────────────────────────────
  push:
    name: Push images to GHCR (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, test, build]   # All three must pass before any image is pushed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dockerfile: services/gateway/Dockerfile
            image: nexus-gateway
          - service: orchestrator
            dockerfile: services/orchestrator/Dockerfile
            image: nexus-orchestrator
          - service: search-agent
            dockerfile: services/search_agent/Dockerfile
            image: nexus-search-agent
          - service: code-agent
            dockerfile: services/code_agent/Dockerfile
            image: nexus-code-agent
          - service: memory-agent
            dockerfile: services/memory_agent/Dockerfile
            image: nexus-memory-agent
          - service: tool-agent
            dockerfile: services/tool_agent/Dockerfile
            image: nexus-tool-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is automatically available — no manual secret needed
          # The 'packages: write' permission at the top of this file grants push access

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}