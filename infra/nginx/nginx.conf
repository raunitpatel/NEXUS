# NEXUS reverse proxy configuration for nginx
# Single public ingress: port 80
# /api/* -> gateway:8000 (FastAPI)
# NOTE (AGNT-001): upstream services do not exist yet.
# / -> frontend:3000 (Next.js) - upstream added in AGNT - 008
# NGINX starts in degraded mode and returns 502 for /api/* until
# gateway (AGNT-003) and frontend (AGNT-008) containers are running.

worker processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Upstream: API Gateway
    upstream nexus_gateway {
        server gateway:8000;
        # keepalive connections for performance
        keepalive 32;
    }

    # Upstream: Next.js frontend (added in AGNT-008)
    # upstream nexus_frontend {
    #     server frontend:3000;
    #     keepalive 32;
    # }

    server {
        listen 80;
        server_name _;

        # API routes -> gateway
        location /api/ {
            proxy_pass          http://nexus_gateway;
            proxy_http_version  1.1;
            proxy_set_header    Host        $host;
            proxy_set_header    X-Real-IP   $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Connection "";

            # SSE support - disable buffering for /api/v1/sse/* endpoints
            # Checked by path prefix; full SSE config added in AGNT-003
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Frontend (commented out until AGNT-008)
        # location / {
        #     proxy_pass          http://nexus_frontend;
        #     proxy_http_version  1.1;
        #     proxy_set_header    Upgradeto $http_upgrade;
        #     proxy_set_header    Connection "upgrade";
        #     proxy_set_header    Host        $host;
        # }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}