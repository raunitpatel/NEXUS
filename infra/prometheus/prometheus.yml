global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway
  - job_name: 'gateway'
    static_configs:
      - targets: ['nexus-gateway:8000']
    metrics_path: /metrics

  # Orchestrator
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['nexus-orchestrator:8001']
    metrics_path: /metrics

  # Search Agent
  - job_name: 'search_agent'
    static_configs:
      - targets: ['nexus-search-agent:8002']
    metrics_path: /metrics

  # Code Agent
  - job_name: 'code_agent'
    static_configs:
      - targets: ['nexus-code-agent:8003']
    metrics_path: /metrics

  # Memory Agent
  - job_name: 'memory_agent'
    static_configs:
      - targets: ['nexus-memory-agent:8004']
    metrics_path: /metrics

  # Tool Agent
  - job_name: 'tool_agent'
    static_configs:
      - targets: ['nexus-tool-agent:8005']
    metrics_path: /metrics